name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          lfs: true

      - name: Download Dalamud
        shell: pwsh
        run: |
          Invoke-WebRequest 'https://goatcorp.github.io/dalamud-distrib/stg/latest.zip' -OutFile dalamud.zip
          Expand-Archive dalamud.zip -DestinationPath dalamud_dist
          "DALAMUD_HOME=$env:GITHUB_WORKSPACE\dalamud_dist" | Out-File -Append $env:GITHUB_ENV

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Build
        run: dotnet build Proteus/Proteus.csproj -c Release

      - name: Read version
        id: version
        shell: pwsh
        run: |
          $manifest = Get-Content "Proteus\bin\Release\win-x64\Proteus.json" | ConvertFrom-Json
          "version=$($manifest.AssemblyVersion)" | Out-File -Append $env:GITHUB_OUTPUT

      - name: Package
        shell: pwsh
        run: Compress-Archive -Path "Proteus\bin\Release\win-x64\*" -DestinationPath latest.zip

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: latest.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify plugins repo
        shell: pwsh
        env:
          PLUGINS_REPO_TOKEN: ${{ secrets.PLUGINS_REPO_TOKEN }}
        run: |
          $headers = @{
            Authorization = "Bearer $env:PLUGINS_REPO_TOKEN"
            Accept        = "application/vnd.github+json"
          }
          $body = @{
            event_type     = "plugin-released"
            client_payload = @{
              plugin  = "Proteus"
              version = "${{ steps.version.outputs.version }}"
            }
          } | ConvertTo-Json

          Invoke-RestMethod -Method Post `
            -Uri "https://api.github.com/repos/solona-m/plugins/dispatches" `
            -Headers $headers `
            -Body $body `
            -ContentType "application/json"

